name: Check book

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08
        with:
          mdbook-version: '0.5.2'
      - name: Build Book
        run: ./zip-solutions.sh && mdbook build
      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --verbose --accept 200,429 --exclude-loopback --no-progress --user-agent 'curl/7.79.1' --root-dir $(pwd)/book book
